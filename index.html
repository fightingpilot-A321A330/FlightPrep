<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 홈 화면 앱 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlightPrep">
    
    <title>Flight Prep Checklist</title>
    
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --accent-color: #0a84ff;
            --border-color: #38383a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-user-select: none;
        }

        header {
            padding: 60px 20px 20px;
            background: rgba(44, 44, 46, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
            border-bottom: 0.5px solid var(--border-color);
        }

        h1 { margin: 0; font-size: 20px; letter-spacing: 1px; color: var(--accent-color); }

        #list { padding: 10px 15px; }

        .check-item {
            background: var(--card-bg);
            margin-bottom: 10px;
            padding: 18px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            font-size: 17px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .check-item:active { transform: scale(0.98); opacity: 0.7; }

        .check-item.checked {
            opacity: 0.5;
            background: #1c1c1e;
            border: 1px solid var(--border-color);
        }

        .check-item.checked .text {
            text-decoration: line-through;
            color: #8e8e93;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checked .checkbox {
            background: var(--accent-color);
        }

        .checked .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }

        .reset-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 20px auto;
            padding: 15px;
            background: #ff453a;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>FLIGHT PREP</h1>
</header>

<div id="list"></div>

<button class="reset-btn" onclick="resetAll()">RESET ALL</button>

<script>
    const DEFAULT_ITEMS = [
        "A-OPCS 확인",
        "Weather 확인",
        "NOTAM 확인",
        "Route Review",
        "필수 지참물 (라이센스/로그북)",
        "Fuel Planning",
        "Aircraft Document"
    ];

    let items = JSON.parse(localStorage.getItem('items')) || DEFAULT_ITEMS;
    let checked = JSON.parse(localStorage.getItem('checked')) || {};

    function render() {
        const listEl = document.getElementById('list');
        listEl.innerHTML = '';
        
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `check-item ${checked[index] ? 'checked' : ''}`;
            div.innerHTML = `
                <div class="checkbox"></div>
                <div class="text">${item}</div>
            `;
            div.onclick = () => toggle(index);
            listEl.appendChild(div);
        });
    }

    function toggle(index) {
        checked[index] = !checked[index];
        localStorage.setItem('checked', JSON.stringify(checked));
        
        // 아이폰 햅틱 진동
        if (navigator.vibrate) navigator.vibrate(40);
        
        render();
    }

    function resetAll() {
        if(confirm("모든 항목을 초기화할까요?")) {
            checked = {};
            localStorage.setItem('checked', JSON.stringify(checked));
            render();
        }
    }

    render();
</script>

</body>
</html>
